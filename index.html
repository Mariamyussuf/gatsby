<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUSA Dinner & Awards — The Great Gatsby Gala</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #1A0305; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1A0305; }
      ::-webkit-scrollbar-thumb { background: #C9962A; border-radius: 3px; }

      @keyframes chandelier-sway {
        0%, 100% { transform: rotate(-1.5deg); }
        50% { transform: rotate(1.5deg); }
      }
      @keyframes flame-flicker {
        0%, 100% { opacity: 1; transform: scaleY(1) scaleX(1); }
        25% { opacity: 0.85; transform: scaleY(1.05) scaleX(0.95); }
        50% { opacity: 0.9; transform: scaleY(0.95) scaleX(1.05); }
        75% { opacity: 0.8; transform: scaleY(1.1) scaleX(0.9); }
      }
      @keyframes glow-pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      .chandelier-sway {
        animation: chandelier-sway 4s ease-in-out infinite;
        transform-origin: top center;
      }
      .flame-flicker {
        animation: flame-flicker 1.5s ease-in-out infinite;
        transform-origin: bottom center;
      }
      .flame-flicker-2 {
        animation: flame-flicker 1.8s ease-in-out infinite 0.3s;
        transform-origin: bottom center;
      }
      .flame-flicker-3 {
        animation: flame-flicker 2.1s ease-in-out infinite 0.6s;
        transform-origin: bottom center;
      }
      .fade-up-1 { animation: fade-up 1s ease-out 0.3s both; }
      .fade-up-2 { animation: fade-up 1s ease-out 0.6s both; }
      .fade-up-3 { animation: fade-up 1s ease-out 0.9s both; }
      .fade-up-4 { animation: fade-up 1s ease-out 1.2s both; }
      .fade-up-5 { animation: fade-up 1s ease-out 1.5s both; }
      .fade-up-6 { animation: fade-up 1s ease-out 1.8s both; }
      .glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }
      .gold-shimmer {
        background: linear-gradient(90deg, #C9962A 0%, #F5D875 30%, #E8B84B 50%, #F5D875 70%, #C9962A 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 4s linear infinite;
      }
    </style>
    <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
</head>
  <body>
    <div id="root"></div>
    <script src="https://checkout.squadco.com/widget/checkout.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
